---
services:
  s-ui:
    image: s-ui
    container_name: s-ui
    hostname: "s-ui"
    volumes:
      - "./db:/app/db"
      - "./cert:/app/cert"
    tty: true
    restart: unless-stopped
    ports:
      - "2095:2095"
      - "2096:2096"
    entrypoint: "./entrypoint.sh"

  s-ui-node:
    image: s-ui
    container_name: s-ui-node
    hostname: "s-ui-node"
    tty: true
    restart: unless-stopped
    network_mode: "host"
    environment:
      - "SUI_MODE=node"
      - "SUI_PANEL_URL=http://127.0.0.1:2095/app"
      - "SUI_NODE_TOKEN=localnode"
    entrypoint: "./entrypoint.sh"

